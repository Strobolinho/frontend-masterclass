<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>I am <b>Wowka</b></p>
    <p>I am <em>Wowka</em></p>
    <p>I am <small>Wowka</small></p>
    <p>I am <del>Wowka</del></p>
    <p>I am <ins>Wowka</ins></p>

    <p>x<sub>2</sub></p>
    <p>x<sup>2</sup></p>

    <p>You will only fail if you stop <mark>trying</mark></p>

    <p><q>Quote</q></p>

    <p>Do you know <abbr title="Hyper Text Markup Language">HTML</abbr></p>
  </body>
</html>
